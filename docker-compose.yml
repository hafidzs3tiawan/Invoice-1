version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: invoice_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invoice_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d invoice_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: invoice_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: invoice_db
      DB_PORT: 5432
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  # Optional: For frontend tracking if the user wants to containerize the next.js
  # We will just write the code and let them run `npm run dev` as Next.js is better developed locally.

volumes:
  pgdata:
